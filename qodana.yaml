# Qodana configuration — https://www.jetbrains.com/help/qodana/qodana-yaml.html
version: "1.0"

# Use the Go linter (based on GoLand) — covers Go + JS/TS inspections.
linter: qodana-go

# Custom inspection profile that extends qodana.recommended with JS/TS enabled.
profile:
  path: .qodana/profile.xml

# Exclude paths that should not be analyzed.
exclude:
  - name: All
    paths:
      - node_modules
      - vendor
      - .docker-data
      - deploy
      - work
      - e2e
