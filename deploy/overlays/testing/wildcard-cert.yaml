# Wildcard TLS certificate for *.madalin.me via DNS-01 (Cloudflare).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-madalin-me
  namespace: yaaicms
spec:
  secretName: wildcard-madalin-me-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - "madalin.me"
    - "*.madalin.me"
